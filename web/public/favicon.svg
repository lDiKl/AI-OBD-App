<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <!-- Background -->
  <rect width="100" height="100" rx="18" fill="#e8e8e8"/>

  <!-- Wrench 1 (rotated -42°) -->
  <g transform="rotate(-42, 50, 58)" stroke="#505050" stroke-linecap="round" stroke-linejoin="round" fill="#e8e8e8">
    <rect x="46.5" y="26" width="7" height="48" rx="3.5" stroke-width="2"/>
    <path d="M43 32 L43 26 Q43 19 50 19 Q57 19 57 26 L57 32 L43 32 Z" stroke-width="2"/>
  </g>

  <!-- Wrench 2 (rotated +42°) -->
  <g transform="rotate(42, 50, 58)" stroke="#505050" stroke-linecap="round" stroke-linejoin="round" fill="#e8e8e8">
    <rect x="46.5" y="26" width="7" height="48" rx="3.5" stroke-width="2"/>
    <path d="M43 32 L43 26 Q43 19 50 19 Q57 19 57 26 L57 32 L43 32 Z" stroke-width="2"/>
  </g>

  <!-- Car body with wheel arches -->
  <path d="M12 68 L12 62 L24 54 L36 48 L62 48 L72 56 L86 60 L90 68
           L80 68 Q80 60 72 60 Q64 60 64 68
           L34 68 Q34 60 26 60 Q18 60 18 68 Z"
        fill="#e8e8e8" stroke="#505050" stroke-width="2.5" stroke-linejoin="round"/>

  <!-- Window -->
  <path d="M27 62 L36 54 L62 54 L62 62 Z"
        fill="#e8e8e8" stroke="#505050" stroke-width="2" stroke-linejoin="round"/>

  <!-- Wheels -->
  <circle cx="26" cy="68" r="8" fill="#e8e8e8" stroke="#505050" stroke-width="2.5"/>
  <circle cx="72" cy="68" r="8" fill="#e8e8e8" stroke="#505050" stroke-width="2.5"/>
</svg>
